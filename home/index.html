<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>26363 Esperanza Dr — Los Altos Hills</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f8f6f1;
      color: #3d3929;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─── */
    header {
      background: linear-gradient(to right, #fffcf7, #fff);
      padding: 18px 36px;
      border-bottom: 1px solid #ebe8e1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 500;
      color: #2c2a22;
    }
    .header-left h1 span {
      font-weight: 400;
      font-style: italic;
      color: #9c9785;
    }
    .header-left p {
      margin-top: 1px;
      color: #b5ae9e;
      font-size: 0.78rem;
      letter-spacing: 0.3px;
    }
    .header-pills {
      display: flex;
      gap: 8px;
    }
    .header-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 15px;
      border-radius: 24px;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid #ebe8e1;
      background: #fff;
      color: #6b6656;
    }
    .header-pill.green {
      background: #f0faf0;
      border-color: #c6e6c6;
      color: #2d7a2d;
    }
    .header-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4caf50;
      animation: softPulse 2.5s ease-in-out infinite;
    }

    /* ─── Apply button ─── */
    .apply-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: 24px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      background: #5c4b28;
      color: #fff;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .apply-btn:hover {
      background: #3d3929;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(92,75,40,0.25);
    }
    .apply-btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: 24px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      background: transparent;
      color: #5c4b28;
      border: 2px solid #d4cfc0;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .apply-btn-outline:hover {
      border-color: #5c4b28;
      background: #f5f0e8;
    }
    @keyframes softPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ─── Hero landing page ─── */
    .hero {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 32px;
      cursor: pointer;
    }
    .hero img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      display: block;
      transition: transform 6s ease;
    }
    .hero:hover img { transform: scale(1.04); }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(30,28,20,0.82) 0%, rgba(30,28,20,0.3) 50%, rgba(30,28,20,0.05) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 36px 40px;
    }
    .hero-overlay h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 500;
      color: #fff;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .hero-overlay p {
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
      max-width: 500px;
    }
    .hero-pills {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .hero-pill {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      background: rgba(255,255,255,0.15);
      color: #fff;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Quick-nav cards on landing */
    .quick-nav {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .quick-nav .qn-card:nth-child(-n+2) {
      grid-column: span 1;
    }
    @media (min-width: 769px) {
      .quick-nav { grid-template-columns: repeat(5, 1fr); }
      .quick-nav .qn-card:nth-child(-n+2) { grid-column: span 1; }
    }
    .qn-card {
      background: #fff;
      border: 1px solid #ebe8e1;
      border-radius: 14px;
      padding: 22px 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .qn-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(60,50,30,0.08);
      border-color: #d4cfc0;
    }
    .qn-card .qn-icon { font-size: 1.6rem; margin-bottom: 8px; display: block; }
    .qn-card h3 { font-size: 0.88rem; font-weight: 600; color: #3d3929; margin-bottom: 3px; }
    .qn-card p { font-size: 0.74rem; color: #9c9785; line-height: 1.4; }

    /* ─── Footer ─── */
    .site-footer {
      background: #fff;
      border-top: 1px solid #ebe8e1;
      padding: 28px 40px;
      text-align: center;
    }
    .site-footer .ft-addr {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: #3d3929;
      margin-bottom: 4px;
    }
    .site-footer .ft-sub {
      font-size: 0.78rem;
      color: #b5ae9e;
      margin-bottom: 12px;
    }
    .site-footer .ft-links {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .site-footer .ft-link {
      padding: 5px 14px;
      border-radius: 16px;
      font-size: 0.75rem;
      font-weight: 500;
      background: #f5f2ec;
      color: #7a7464;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .site-footer .ft-link:hover { background: #ede4d4; color: #5c4b28; }

    /* ─── Dual hero ─── */
    .hero-duo {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 14px;
      margin-bottom: 32px;
    }
    .hero-duo .hero { margin-bottom: 0; }
    .hero-duo .hero-small { border-radius: 20px; overflow: hidden; }
    .hero-duo .hero-small img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 4s ease;
    }
    .hero-duo .hero-small:hover img { transform: scale(1.04); }

    /* Amenity row on landing */
    .amenity-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }
    .amenity {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      background: #fff;
      border: 1px solid #ebe8e1;
      border-radius: 24px;
      font-size: 0.82rem;
      color: #5c5647;
      font-weight: 500;
    }
    .amenity .am-icon { font-size: 1rem; }

    /* ─── Layout ─── */
    .container {
      display: flex;
      min-height: calc(100vh - 66px);
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #fffcf7;
      border-right: 1px solid #ebe8e1;
      padding: 22px 0;
      overflow-y: auto;
      position: sticky;
      top: 66px;
      height: calc(100vh - 66px);
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: #ddd8cd; border-radius: 3px; }
    .sb-label {
      padding: 0 22px 8px;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: #b5ae9e;
      font-weight: 700;
    }
    .sb-divider {
      height: 1px;
      background: #f0ede6;
      margin: 12px 22px;
    }
    .sb-btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 10px 22px;
      border: none;
      background: transparent;
      color: #7a7464;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      gap: 10px;
      border-left: 3px solid transparent;
    }
    .sb-btn:hover { background: #faf8f4; color: #3d3929; }
    .sb-btn.active {
      background: #f5f0e8;
      color: #5c4b28;
      border-left-color: #b8945a;
      font-weight: 500;
    }
    .sb-btn .sb-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border-radius: 8px;
      background: #f5f2ec;
      font-size: 0.78rem;
      font-weight: 600;
      flex-shrink: 0;
      color: #9c9785;
    }
    .sb-btn.active .sb-icon {
      background: #ede4d4;
      color: #7a6638;
    }
    .sb-btn .sb-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sb-btn .sb-dot.open { background: #4caf50; }
    .sb-btn .sb-dot.taken { background: #ccc; }
    .sb-btn .sb-count {
      margin-left: auto;
      font-size: 0.7rem;
      color: #c4bfb2;
      font-weight: 500;
    }
    .sb-btn.dim { opacity: 0.42; }
    .sb-btn.dim:hover { opacity: 0.65; }

    /* ─── Main ─── */
    .main {
      flex: 1;
      padding: 32px 42px 60px;
      overflow-y: auto;
      max-width: 1100px;
    }

    /* Fade-in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.3s ease-out forwards; }

    /* Staggered photo entrance */
    .photo-grid .photo-card {
      opacity: 0;
      animation: fadeUp 0.35s ease-out forwards;
    }
    .photo-grid .photo-card:nth-child(1) { animation-delay: 0.05s; }
    .photo-grid .photo-card:nth-child(2) { animation-delay: 0.1s; }
    .photo-grid .photo-card:nth-child(3) { animation-delay: 0.15s; }
    .photo-grid .photo-card:nth-child(4) { animation-delay: 0.2s; }
    .photo-grid .photo-card:nth-child(5) { animation-delay: 0.25s; }
    .photo-grid .photo-card:nth-child(6) { animation-delay: 0.3s; }
    .photo-grid .photo-card:nth-child(7) { animation-delay: 0.35s; }
    .photo-grid .photo-card:nth-child(n+8) { animation-delay: 0.4s; }

    /* Scroll hint on hero */
    .scroll-hint {
      display: flex;
      justify-content: center;
      margin: -14px 0 24px;
      animation: bounce 2s ease-in-out infinite;
    }
    .scroll-hint span {
      font-size: 0.75rem;
      color: #b5ae9e;
      letter-spacing: 1px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }

    /* ─── Page titles ─── */
    .pg-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: #2c2a22;
      margin-bottom: 4px;
    }
    .pg-sub {
      font-size: 0.88rem;
      color: #9c9785;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .pill {
      display: inline-block;
      padding: 3px 11px;
      border-radius: 16px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-right: 5px;
    }
    .pill-warm { background: #f5f0e8; color: #8a7245; }
    .pill-green { background: #edf7ed; color: #3a7a3a; }
    .pill-red { background: #fdf0ef; color: #b05050; }

    /* ─── Legend ─── */
    .legend {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 26px;
      padding: 11px 16px;
      background: #fff;
      border-radius: 10px;
      border: 1px solid #ebe8e1;
      font-size: 0.82rem;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; color: #7a7464; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; }
    .legend-dot.g { background: #4caf50; }
    .legend-dot.r { background: #ccc; }
    .legend .lg-count { margin-left: auto; color: #b5ae9e; font-weight: 500; }

    /* ─── Section headings ─── */
    .sec-head {
      font-size: 1rem;
      font-weight: 600;
      color: #3d3929;
      margin-bottom: 14px;
      padding-bottom: 9px;
      border-bottom: 1px solid #f0ede6;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sec-head .si { font-size: 1.1rem; }

    /* ─── Photo grid ─── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .photo-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #eee;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      aspect-ratio: 4/3;
    }
    .photo-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 36px rgba(60,50,30,0.14);
    }
    .photo-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .photo-card:hover img { transform: scale(1.04); }
    .photo-card .overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 13px 10px;
      background: linear-gradient(transparent, rgba(30,28,20,0.65));
      font-size: 0.78rem;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    /* ─── Room sections ─── */
    .room-sec { margin-bottom: 34px; }
    .room-sec-head {
      font-size: 0.92rem;
      font-weight: 500;
      color: #6b6656;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #f0ede6;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .room-sec-head span[onclick] {
      transition: color 0.15s;
    }
    .room-sec-head span[onclick]:hover {
      color: #5c4b28;
      text-decoration: underline;
    }
    .room-sec-head .rs-count {
      margin-left: auto;
      font-size: 0.72rem;
      color: #c4bfb2;
    }
    .room-sec.dim .photo-grid { opacity: 0.3; transition: opacity 0.25s; }
    .room-sec.dim:hover .photo-grid { opacity: 0.6; }

    /* ─── Welcome banner ─── */
    .welcome-banner {
      background: linear-gradient(135deg, #f7f3ec, #eee8dd);
      border-radius: 16px;
      padding: 30px 34px;
      margin-bottom: 28px;
      border: 1px solid #e6dfd2;
    }
    .welcome-banner h3 {
      font-family: 'Playfair Display', serif;
      color: #3d3929;
      font-weight: 400;
      font-size: 1.15rem;
      margin-bottom: 6px;
    }
    .welcome-banner p {
      color: #7a7464;
      font-size: 0.88rem;
      line-height: 1.65;
    }

    /* ─── Host section ─── */
    .host-section {
      background: #fff;
      border: 1px solid #ebe8e1;
      border-radius: 18px;
      padding: 34px;
      margin-bottom: 28px;
    }
    .host-top {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .host-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4c4a0, #b8945a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #fff;
      flex-shrink: 0;
    }
    .host-info h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: #2c2a22;
      font-weight: 400;
    }
    .host-info p {
      color: #9c9785;
      font-size: 0.85rem;
      margin-top: 2px;
    }
    .host-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .host-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #f5f0e8;
      color: #8a7245;
    }
    .host-body { line-height: 1.75; }
    .host-body p {
      color: #5c5647;
      font-size: 0.9rem;
      margin-bottom: 14px;
    }
    .host-highlights {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
    .host-hl {
      background: #faf8f4;
      border: 1px solid #f0ede6;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .host-hl .hl-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .host-hl h4 {
      font-size: 0.85rem;
      color: #3d3929;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .host-hl p {
      font-size: 0.8rem;
      color: #9c9785;
      line-height: 1.5;
      margin-bottom: 0;
    }

    /* ─── Lightbox ─── */
    .lightbox {
      display: none;
      position: fixed; inset: 0;
      z-index: 1000;
      background: rgba(44,42,34,0.92);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw; max-height: 82vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      animation: fadeUp 0.2s ease-out;
    }
    .lightbox .lb-caption { margin-top: 14px; color: #d4cfc3; font-size: 0.88rem; }
    .lightbox .lb-close {
      position: absolute; top: 16px; right: 24px;
      background: rgba(255,255,255,0.12); border: none;
      color: #e8e3d8; font-size: 1.5rem;
      width: 42px; height: 42px; border-radius: 50%;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      z-index: 1001;
    }
    .lightbox .lb-close:hover { background: rgba(255,255,255,0.25); }
    .lightbox .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.12); border: none;
      color: #e8e3d8; font-size: 1.5rem;
      width: 48px; height: 48px; border-radius: 50%;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox .lb-nav:hover { background: rgba(255,255,255,0.25); }
    .lightbox .lb-prev { left: 20px; }
    .lightbox .lb-next { right: 20px; }
    .lightbox .lb-counter {
      position: absolute; bottom: 20px;
      color: rgba(255,255,255,0.4); font-size: 0.82rem; font-weight: 500;
    }

    /* ─── Neighborhood ─── */
    .nbr-hero {
      background: linear-gradient(135deg, #eef5ec, #f4f1e8);
      border-radius: 16px;
      padding: 34px;
      margin-bottom: 28px;
      border: 1px solid #dce8d8;
    }
    .nbr-hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 400; color: #2c2a22; margin-bottom: 8px;
    }
    .nbr-hero p { color: #6b7e62; font-size: 0.9rem; line-height: 1.7; }
    .nbr-hero .loc-pill {
      display: inline-block; margin-top: 12px;
      padding: 5px 13px; background: rgba(76,175,80,0.1);
      color: #3a7a3a; border-radius: 16px;
      font-size: 0.78rem; font-weight: 600; margin-right: 6px;
    }

    .place-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px; margin-bottom: 34px;
    }
    .place-card {
      background: #fff;
      border: 1px solid #ebe8e1;
      border-radius: 14px; padding: 22px;
      transition: transform 0.2s ease, box-shadow 0.2s;
    }
    .place-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(60,50,30,0.08); }
    .place-card .pc-icon { font-size: 1.6rem; margin-bottom: 10px; display: block; }
    .place-card h3 { font-size: 0.95rem; font-weight: 600; color: #3d3929; margin-bottom: 4px; }
    .place-card .pc-dist {
      font-size: 0.72rem; color: #6b8f3a; margin-bottom: 8px;

<script>

                <span class="hero-pill">${availCount} rooms available</span>
              </div>
            </div>
          </div>

        </div>

        <div class="welcome-banner" style="text-align:center; margin-bottom:24px;">

          <p style="max-width:640px; margin:10px auto 0;">

            shared spaces that actually feel welcoming, and a host who's helped dozens of people
            settle into Silicon Valley life. You won't just have a room. You'll have someone in your corner.</p>
        </div>

        <div class="amenity-row" style="justify-content:center;">
          <div class="amenity"><span class="am-icon">&#128075;</span> On-site host</div>
          <div class="amenity"><span class="am-icon">&#127946;</span> Backyard pool</div>
          <div class="amenity"><span class="am-icon">&#127860;</span> Full kitchen</div>
          <div class="amenity"><span class="am-icon">&#128293;</span> Patio &amp; BBQ</div>
          <div class="amenity"><span class="am-icon">&#128087;</span> Washer &amp; dryer</div>
          <div class="amenity"><span class="am-icon">&#128663;</span> Free parking</div>
          <div class="amenity"><span class="am-icon">&#128246;</span> WiFi</div>
          <div class="amenity"><span class="am-icon">&#127795;</span> Trails nearby</div>
          <div class="amenity"><span class="am-icon">&#129414;</span> Wildlife &amp; nature</div>
        </div>

        <div style="text-align:center; margin-bottom:28px;">
          <a href="https://forms.gle/QG5dA3XahoxpiGUGA" target="_blank" rel="noopener" class="apply-btn" style="padding:13px 32px; font-size:0.92rem;">Apply for Housing</a>
          <p style="font-size:0.76rem; color:#b5ae9e; margin-top:8px;">Takes just a few minutes &mdash; no commitment</p>
        </div>

        <div class="callout sage" style="margin-bottom:28px;">

            <span class="qn-icon">&#128209;</span>

          <div class="qn-card" onclick="showRoom('guide')">
            <span class="qn-icon">&#128214;</span>

          </div>
          <div class="qn-card" onclick="showRoom('neighborhood')">

  // ─── Lightbox ───
  function openLightbox(rid, idx) {
    const d = rid === 0 ? homePhotos : rooms.find(r => r.id === rid);
    lightboxPhotos = d.photos.map(p => ({ src: pp(d.folder,p), caption: `${d.name} \u2014 ${cn(p)}` }));
    lightboxIndex = idx;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  function navigateLightbox(dir) {
    lightboxIndex = (lightboxIndex + dir + lightboxPhotos.length) % lightboxPhotos.length;
    updateLightbox();
  }
  function updateLightbox() {
    const item = lightboxPhotos[lightboxIndex];
    document.getElementById('lb-img').src = item.src;
    document.getElementById('lb-caption').textContent = item.caption;
    document.getElementById('lb-counter').textContent = `${lightboxIndex+1} / ${lightboxPhotos.length}`;
  }
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key==='Escape') closeLightbox();
    if (e.key==='ArrowLeft') navigateLightbox(-1);
    if (e.key==='ArrowRight') navigateLightbox(1);
  });
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target.id==='lightbox') closeLightbox();
  });
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
